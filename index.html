<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>便签整理术</title>
<style>
/*
 * 便签整理术 — Digital Sticky Note Organizer
 * Aesthetic: Warm Minimalism (Wabi-Sabi meets Muji)
 * 60% warm white #FAFAF7 · 30% charcoal #1A1A1A · 10% terracotta #C67A4B
 * Typography: Serif display + Sans body · 8px grid · purposeful motion
 */

:root {
  --bg: #FAFAF7;
  --surface: #FFFFFF;
  --surface-alt: #F5F4F1;
  --text-1: #1A1A1A;
  --text-2: #6B6B6B;
  --text-3: #9E9E9E;
  --border: #E8E6E1;
  --border-light: #F0EEEA;
  --accent: #C67A4B;
  --accent-hover: #B56A3E;
  --accent-light: rgba(198,122,75,0.06);
  --accent-bg: rgba(198,122,75,0.10);
  --success: #3A7D1A;
  --success-light: rgba(58,125,26,0.08);
  --danger: #D44444;
  --danger-light: rgba(212,68,68,0.06);
  --n-yellow: #FFF9E0;
  --n-pink: #FFF0F2;
  --n-green: #EEFAE8;
  --n-blue: #EBF5FF;
  --n-orange: #FFF4E8;
  --n-purple: #F5F0FA;
  --n-yellow-border: #E8D88A;
  --n-pink-border: #E8B0BA;
  --n-green-border: #A8D89A;
  --n-blue-border: #9AC8E8;
  --n-orange-border: #E8C49A;
  --n-purple-border: #C8A8E8;
  --radius: 6px;
  --radius-sm: 4px;
  --radius-lg: 10px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.03);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.07);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.09);
  --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
  --dur: 220ms;
  --font-display: "Hiragino Mincho ProN", "Songti SC", "Noto Serif SC", "STSong", "SimSun", serif;
  --font-body: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  --sidebar-w: 200px;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  color: var(--text-1);
  background: var(--bg);
  display: flex;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 32px 0 24px;
  overflow-y: auto;
  flex-shrink: 0;
}
.sidebar-brand {
  padding: 0 24px 28px;
  border-bottom: 1px solid var(--border-light);
  margin-bottom: 8px;
}
.sidebar-brand h1 {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--text-1);
  line-height: 1.3;
}
.sidebar-brand p {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 4px;
  letter-spacing: 0.03em;
}
.nav-list {
  list-style: none;
  padding: 8px 0;
  flex: 1;
}
.nav-item {
  padding: 10px 24px;
  font-size: 14px;
  color: var(--text-2);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  border-left: 3px solid transparent;
  position: relative;
  user-select: none;
}
.nav-item:hover {
  color: var(--text-1);
  background: var(--accent-light);
}
.nav-item.active {
  color: var(--accent);
  font-weight: 500;
  border-left-color: var(--accent);
  background: var(--accent-light);
}

/* ===== MAIN ===== */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 40px;
  min-width: 0;
}
.view { display: none; animation: fadeIn var(--dur) var(--ease); }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.view-header {
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border-light);
}
.view-header h2 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  color: var(--text-1);
  letter-spacing: 0.01em;
}
.view-header p {
  font-size: 13px;
  color: var(--text-2);
  margin-top: 6px;
  line-height: 1.5;
}

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  line-height: 1.4;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-ghost {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border);
}
.btn-ghost:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-danger { background: var(--danger-light); color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: #fff; }

/* ===== NOTE CARDS ===== */
.note-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}
.note-card {
  padding: 16px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  box-shadow: var(--shadow-sm);
  transition: all var(--dur) var(--ease);
  position: relative;
  min-height: 80px;
  cursor: default;
  animation: noteIn 300ms var(--ease);
}
@keyframes noteIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.note-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}
.note-card[data-color="yellow"] { background: var(--n-yellow); border-color: var(--n-yellow-border); }
.note-card[data-color="pink"] { background: var(--n-pink); border-color: var(--n-pink-border); }
.note-card[data-color="green"] { background: var(--n-green); border-color: var(--n-green-border); }
.note-card[data-color="blue"] { background: var(--n-blue); border-color: var(--n-blue-border); }
.note-card[data-color="orange"] { background: var(--n-orange); border-color: var(--n-orange-border); }
.note-card[data-color="purple"] { background: var(--n-purple); border-color: var(--n-purple-border); }
.note-card .note-text {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-1);
  word-break: break-word;
}
.note-card .note-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  font-size: 11px;
  color: var(--text-3);
}
.note-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.03em;
}
.note-badge.todo { background: var(--accent-bg); color: var(--accent); }
.note-badge.schedule { background: rgba(26,26,26,0.06); color: var(--text-2); }
.note-actions {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity var(--dur) var(--ease);
}
.note-card:hover .note-actions { opacity: 1; }
.note-action-btn {
  width: 26px;
  height: 26px;
  border: none;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.8);
  color: var(--text-2);
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--dur) var(--ease);
  backdrop-filter: blur(4px);
}
.note-action-btn:hover { background: var(--surface); color: var(--text-1); }
.note-action-btn.delete:hover { color: var(--danger); }

/* Draggable notes (compact) */
.note-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: grab;
  transition: all var(--dur) var(--ease);
  border: 1px solid transparent;
  max-width: 200px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.note-chip:active { cursor: grabbing; }
.note-chip.dragging { opacity: 0.4; }
.note-chip[data-color="yellow"] { background: var(--n-yellow); border-color: var(--n-yellow-border); }
.note-chip[data-color="pink"] { background: var(--n-pink); border-color: var(--n-pink-border); }
.note-chip[data-color="green"] { background: var(--n-green); border-color: var(--n-green-border); }
.note-chip[data-color="blue"] { background: var(--n-blue); border-color: var(--n-blue-border); }
.note-chip[data-color="orange"] { background: var(--n-orange); border-color: var(--n-orange-border); }
.note-chip[data-color="purple"] { background: var(--n-purple); border-color: var(--n-purple-border); }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 64px 24px;
  color: var(--text-3);
}
.empty-state .empty-icon {
  font-size: 40px;
  margin-bottom: 16px;
  opacity: 0.3;
}
.empty-state p {
  font-size: 14px;
  line-height: 1.6;
  max-width: 280px;
  margin: 0 auto;
}

/* ===== MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,26,26,0.3);
  backdrop-filter: blur(2px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  animation: overlayIn var(--dur) var(--ease);
}
.modal-overlay.active { display: flex; }
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
.modal-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 440px;
  padding: 32px;
  position: relative;
  animation: modalIn 280ms var(--ease);
  max-height: 90vh;
  overflow-y: auto;
}
@keyframes modalIn { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal-card h3 {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 24px;
  color: var(--text-1);
}
.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  color: var(--text-3);
  font-size: 18px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--dur) var(--ease);
}
.modal-close:hover { background: var(--surface-alt); color: var(--text-1); }

/* ===== FORM ===== */
.form-group {
  margin-bottom: 20px;
}
.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 6px;
  letter-spacing: 0.02em;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 14px;
  color: var(--text-1);
  background: var(--bg);
  transition: border-color var(--dur) var(--ease);
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-hint {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 4px;
}
.color-picker {
  display: flex;
  gap: 8px;
}
.color-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all var(--dur) var(--ease);
}
.color-dot:hover { transform: scale(1.15); }
.color-dot.active { border-color: var(--text-1); box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--text-2); }
.color-dot[data-c="yellow"] { background: var(--n-yellow); }
.color-dot[data-c="pink"] { background: var(--n-pink); }
.color-dot[data-c="green"] { background: var(--n-green); }
.color-dot[data-c="blue"] { background: var(--n-blue); }
.color-dot[data-c="orange"] { background: var(--n-orange); }
.color-dot[data-c="purple"] { background: var(--n-purple); }
.form-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 28px;
}

/* ===== TOOLBAR ===== */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.toolbar-right { margin-left: auto; }

/* ===== TABS ===== */
.tab-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.tab-btn {
  padding: 10px 20px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  font-family: inherit;
  font-size: 14px;
  color: var(--text-2);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
}
.tab-btn:hover { color: var(--text-1); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 500;
}

/* ===== TIMELINE VIEW ===== */
.timeline-date-nav {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}
.timeline-date-nav .date-display {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 500;
  min-width: 140px;
  text-align: center;
}
.timeline-date-nav .btn { padding: 6px 12px; }
.timeline-container {
  display: flex;
  gap: 32px;
}
.timeline-hours {
  flex: 1;
  min-width: 0;
}
.timeline-row {
  display: flex;
  align-items: stretch;
  min-height: 44px;
  border-bottom: 1px solid var(--border-light);
  transition: background var(--dur) var(--ease);
}
.timeline-row.drag-over { background: var(--accent-light); }
.timeline-label {
  width: 56px;
  flex-shrink: 0;
  font-size: 12px;
  color: var(--text-3);
  padding-top: 12px;
  text-align: right;
  padding-right: 16px;
  font-variant-numeric: tabular-nums;
}
.timeline-content {
  flex: 1;
  padding: 6px 0;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: flex-start;
  min-height: 44px;
}
.timeline-block {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  background: var(--surface-alt);
  border: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-2);
}
.timeline-block .remove-btn {
  margin-left: 6px;
  cursor: pointer;
  color: var(--text-3);
  font-size: 11px;
}
.timeline-block .remove-btn:hover { color: var(--danger); }
.timeline-pool {
  width: 240px;
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  max-height: 600px;
  overflow-y: auto;
}
.timeline-pool h4 {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 12px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.timeline-pool .note-chip { margin-bottom: 6px; display: flex; }

/* ===== TODO LIST VIEW ===== */
.todo-columns {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.todo-column {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.todo-column h4 {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-light);
  letter-spacing: 0.02em;
}
.todo-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 14px;
}
.todo-item:last-child { border-bottom: none; }
.todo-check {
  width: 18px;
  height: 18px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--dur) var(--ease);
  background: transparent;
  font-size: 11px;
  color: transparent;
}
.todo-check:hover { border-color: var(--accent); }
.todo-check.checked {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.todo-item.done .todo-text {
  text-decoration: line-through;
  color: var(--text-3);
}

/* ===== MONSTER VIEW ===== */
.monster-layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 24px;
  align-items: start;
}
.monster-list-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.monster-list-panel h4 {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 16px;
  letter-spacing: 0.02em;
}
.monster-item {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  transition: all var(--dur) var(--ease);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 4px;
}
.monster-item:hover { background: var(--surface-alt); }
.monster-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
.monster-item .monster-count {
  font-size: 11px;
  color: var(--text-3);
  background: var(--surface-alt);
  padding: 1px 7px;
  border-radius: 10px;
}
.monster-item.active .monster-count { background: var(--accent-bg); color: var(--accent); }
.monster-detail-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  min-height: 300px;
}
.monster-detail-panel h3 {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}
.monster-hint {
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 20px;
  padding: 10px 14px;
  background: var(--surface-alt);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--accent);
  line-height: 1.6;
}
.step-list {
  list-style: none;
  margin: 16px 0;
}
.step-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 14px;
}
.step-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--accent-bg);
  color: var(--accent);
  font-size: 11px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.step-item .remove-step {
  margin-left: auto;
  color: var(--text-3);
  cursor: pointer;
  font-size: 14px;
  opacity: 0;
  transition: opacity var(--dur) var(--ease);
}
.step-item:hover .remove-step { opacity: 1; }
.step-item .remove-step:hover { color: var(--danger); }
.inline-input {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.inline-input input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  background: var(--bg);
}
.inline-input input:focus { border-color: var(--accent); }

/* ===== MATRIX VIEW ===== */
.matrix-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 12px;
  margin-bottom: 24px;
}
.matrix-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  min-height: 160px;
  transition: all var(--dur) var(--ease);
}
.matrix-cell.drag-over {
  border-color: var(--accent);
  background: var(--accent-light);
}
.matrix-cell-header {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  justify-content: space-between;
}
.matrix-cell-header .quad-label {
  font-weight: 600;
  color: var(--accent);
}
.matrix-cell .note-chip { margin: 4px 0; display: flex; }
.matrix-cell .note-chip .chip-remove {
  margin-left: auto;
  cursor: pointer;
  color: var(--text-3);
  font-size: 11px;
  flex-shrink: 0;
}
.matrix-cell .note-chip .chip-remove:hover { color: var(--danger); }
.matrix-pool {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.matrix-pool h4 {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 12px;
  letter-spacing: 0.03em;
}
.matrix-pool .chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.matrix-axis-label {
  font-size: 11px;
  color: var(--text-3);
  text-align: center;
  padding: 4px;
}

/* ===== HABIT VIEW ===== */
.habit-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  animation: noteIn 300ms var(--ease);
}
.habit-card h4 {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
}
.habit-reward {
  font-size: 12px;
  color: var(--text-2);
  margin-bottom: 20px;
}
.habit-dots {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  max-width: 320px;
  margin-bottom: 16px;
}
.habit-dot {
  aspect-ratio: 1;
  border-radius: 50%;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: transparent;
  background: transparent;
  position: relative;
}
.habit-dot:hover { border-color: var(--accent); transform: scale(1.1); }
.habit-dot.checked {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.habit-dot.future { opacity: 0.35; pointer-events: none; }
.habit-progress {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--text-2);
}
.habit-bar {
  flex: 1;
  max-width: 320px;
  height: 6px;
  background: var(--surface-alt);
  border-radius: 3px;
  overflow: hidden;
}
.habit-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 400ms var(--ease);
}
.habit-celebration {
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--success-light);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--success);
  border-left: 3px solid var(--success);
}
.habit-delete {
  float: right;
  color: var(--text-3);
  cursor: pointer;
  font-size: 14px;
  transition: color var(--dur) var(--ease);
}
.habit-delete:hover { color: var(--danger); }

/* ===== INVENTORY VIEW ===== */
.inventory-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.inventory-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.inventory-panel h4 {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-light);
  letter-spacing: 0.02em;
}
.inv-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 14px;
}
.inv-item:last-child { border-bottom: none; }
.inv-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}
.inv-status.has-backup { background: var(--success-light); color: var(--success); }
.inv-status.need-buy { background: var(--danger-light); color: var(--danger); }
.inv-action {
  margin-left: auto;
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
  white-space: nowrap;
  transition: color var(--dur) var(--ease);
}
.inv-action:hover { color: var(--accent-hover); text-decoration: underline; }
.inv-delete {
  color: var(--text-3);
  cursor: pointer;
  font-size: 13px;
  transition: color var(--dur) var(--ease);
}
.inv-delete:hover { color: var(--danger); }

/* ===== FAMILY VIEW ===== */
.family-columns {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.family-column {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.family-column-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-light);
}
.family-column-header h4 {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-1);
}
.family-score {
  font-size: 20px;
  font-weight: 600;
  color: var(--accent);
  font-family: var(--font-display);
}
.family-task-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 14px;
}
.family-task-item:last-of-type { border-bottom: none; }
.family-task-item.done { color: var(--text-3); text-decoration: line-through; opacity: 0.6; }
.family-task-item .task-delete {
  margin-left: auto;
  color: var(--text-3);
  cursor: pointer;
  font-size: 12px;
  opacity: 0;
  transition: opacity var(--dur) var(--ease);
}
.family-task-item:hover .task-delete { opacity: 1; }
.family-task-item .task-delete:hover { color: var(--danger); }

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .main { padding: 24px; }
  .timeline-container { flex-direction: column; }
  .timeline-pool { width: 100%; }
  .monster-layout { grid-template-columns: 1fr; }
  .inventory-layout { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  :root { --sidebar-w: 0; }
  .sidebar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: auto;
    flex-direction: row;
    border-right: none;
    border-top: 1px solid var(--border);
    padding: 0;
    z-index: 900;
    overflow-x: auto;
    background: var(--surface);
  }
  .sidebar-brand { display: none; }
  .nav-list {
    display: flex;
    padding: 0;
    width: 100%;
  }
  .nav-item {
    padding: 12px 14px;
    white-space: nowrap;
    font-size: 12px;
    border-left: none;
    border-bottom: 2px solid transparent;
    text-align: center;
    flex-shrink: 0;
  }
  .nav-item.active {
    border-left-color: transparent;
    border-bottom-color: var(--accent);
  }
  body { flex-direction: column; padding-bottom: 52px; }
  .main { height: calc(100vh - 52px); padding: 20px 16px; }
  .family-columns { grid-template-columns: 1fr; }
  .todo-columns { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .note-grid { grid-template-columns: 1fr; }
  .matrix-grid { grid-template-columns: 1fr; }
  .main { padding: 16px 12px; }
}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-brand">
    <h1>便签整理术</h1>
    <p>可视化 · 细分化 · 一元化</p>
  </div>
  <ul class="nav-list" id="nav">
    <li class="nav-item active" data-view="board">便签板</li>
    <li class="nav-item" data-view="timeline">时间轴</li>
    <li class="nav-item" data-view="todo">待办清单</li>
    <li class="nav-item" data-view="monster">妖怪拆解</li>
    <li class="nav-item" data-view="matrix">整理方阵</li>
    <li class="nav-item" data-view="habit">21天打卡</li>
    <li class="nav-item" data-view="inventory">库存管理</li>
    <li class="nav-item" data-view="family">家庭任务</li>
  </ul>
</nav>

<main class="main" id="app"></main>

<div class="modal-overlay" id="modal">
  <div class="modal-card" id="modal-content"></div>
</div>

<script>
/* ============================================================
   便签整理术 — Core Application
   Based on 10 procedural skills from《人人都能做到的便签整理术》
   ============================================================ */

const STORAGE_KEY = 'bianqian_app';
const COLORS = ['yellow','pink','green','blue','orange','purple'];
const COLOR_NAMES = { yellow:'暖黄', pink:'柔粉', green:'浅绿', blue:'天蓝', orange:'淡橘', purple:'淡紫' };
const DEFAULT_CATEGORIES = ['外出时顺便做','在家5分钟内','用电脑做的事','电话联系'];
const MEMBERS = [
  { key:'dad', label:'爸爸' },
  { key:'mom', label:'妈妈' },
  { key:'child', label:'孩子' }
];

// Factual knowledge embedded from SKUs
const SKU = {
  schedule_vs_todo: {
    schedule: '时间既定，无法随意变换的事（如看医生、上班、开会）',
    todo: '时间待定，可以弹性安排的事（如买东西、回邮件、整理）'
  },
  monster_traits: [
    '作业量非常大，写在一张便签上',
    '无法判断完成时间',
    '想着快点完成，但还是会往后拖',
    '没干劲，看着就头疼'
  ],
  priority_matrix: {
    A: { label:'A — 最先做', desc:'压力大 × 影响大' },
    B: { label:'B', desc:'压力大 × 影响小' },
    C: { label:'C', desc:'压力小 × 影响大' },
    D: { label:'D — 最后做', desc:'压力小 × 影响小' }
  },
  time_matrix: {
    A: { label:'A — 随时能做', desc:'时间短 × 人力少', example:'整理化妆用品' },
    B: { label:'B', desc:'时间长 × 人力少' },
    C: { label:'C', desc:'时间短 × 人力多' },
    D: { label:'D — 需集中力量', desc:'时间长 × 人力多', example:'更改客厅样貌' }
  },
  habit_21day: '养成一个新习惯需要坚持21天。每天完成目标后打卡，贴满21天后给自己一个奖励。'
};

// ===== DATA LAYER =====
function defaultData() {
  return {
    notes: [],
    timelineBlocks: [],
    timelineNotes: [],
    monsters: [],
    matrixPriority: { A:[], B:[], C:[], D:[] },
    matrixTime: { A:[], B:[], C:[], D:[] },
    habits: [],
    inventory: [],
    familyTasks: [],
    categories: [...DEFAULT_CATEGORIES],
    currentView: 'board',
    timelineDate: todayStr()
  };
}

let data = loadData();
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      // Ensure all keys exist
      const def = defaultData();
      for (const k in def) { if (!(k in d)) d[k] = def[k]; }
      return d;
    }
  } catch(e) {}
  return defaultData();
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function formatDate(str) {
  const d = new Date(str + 'T00:00:00');
  const m = d.getMonth()+1, day = d.getDate();
  const weekdays = ['日','一','二','三','四','五','六'];
  return `${m}月${day}日  周${weekdays[d.getDay()]}`;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== NAVIGATION =====
function switchView(view) {
  data.currentView = view;
  save();
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });
  render();
}

document.getElementById('nav').addEventListener('click', e => {
  const item = e.target.closest('.nav-item');
  if (item) switchView(item.dataset.view);
});

// ===== MODAL =====
const modalOverlay = document.getElementById('modal');
const modalContent = document.getElementById('modal-content');
function openModal(html) {
  modalContent.innerHTML = html;
  modalOverlay.classList.add('active');
  const firstInput = modalContent.querySelector('input, textarea, select');
  if (firstInput) setTimeout(() => firstInput.focus(), 50);
}
function closeModal() {
  modalOverlay.classList.remove('active');
  modalContent.innerHTML = '';
}
modalOverlay.addEventListener('click', e => {
  if (e.target === modalOverlay) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ===== NOTE CRUD =====
function createNote(text, color, type, category) {
  const note = { id: uid(), text, color, type, category: category||'', createdAt: Date.now() };
  data.notes.push(note);
  save();
  render();
  return note;
}
function updateNote(id, updates) {
  const note = data.notes.find(n => n.id === id);
  if (note) Object.assign(note, updates);
  save();
  render();
}
function deleteNote(id) {
  data.notes = data.notes.filter(n => n.id !== id);
  data.timelineNotes = data.timelineNotes.filter(tn => tn.noteId !== id);
  ['A','B','C','D'].forEach(q => {
    data.matrixPriority[q] = data.matrixPriority[q].filter(nid => nid !== id);
    data.matrixTime[q] = data.matrixTime[q].filter(nid => nid !== id);
  });
  save();
  render();
}
function getNoteById(id) { return data.notes.find(n => n.id === id); }

// ===== RENDER ENGINE =====
const app = document.getElementById('app');
function render() {
  const view = data.currentView;
  const renderers = {
    board: renderBoard,
    timeline: renderTimeline,
    todo: renderTodo,
    monster: renderMonster,
    matrix: renderMatrix,
    habit: renderHabit,
    inventory: renderInventory,
    family: renderFamily
  };
  app.innerHTML = `<div class="view active">${(renderers[view] || renderBoard)()}</div>`;
  bindViewEvents(view);
}

// ===== 1. 便签板 (skill_001: sticky-note-organization-method) =====
function renderBoard() {
  const notes = data.notes.slice().sort((a,b) => b.createdAt - a.createdAt);
  let cards = '';
  if (notes.length === 0) {
    cards = `<div class="empty-state"><div class="empty-icon">◻</div><p>还没有便签。点击「新建便签」，把脑中的想法写下来——可视化是整理的第一步。</p></div>`;
  } else {
    cards = `<div class="note-grid">${notes.map(n => `
      <div class="note-card" data-color="${n.color}" data-id="${n.id}">
        <div class="note-actions">
          <button class="note-action-btn edit" title="编辑">✎</button>
          <button class="note-action-btn delete" title="删除">×</button>
        </div>
        <div class="note-text">${escHtml(n.text)}</div>
        <div class="note-meta">
          <span class="note-badge ${n.type}">${n.type==='todo'?'TODO':'日程'}</span>
          ${n.category ? `<span>${escHtml(n.category)}</span>` : ''}
        </div>
      </div>`).join('')}</div>`;
  }
  return `
    <div class="view-header">
      <h2>便签板</h2>
      <p>将所有想法和待办集中在一处管理——一元化，是整理的起点</p>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" id="btn-new-note">+ 新建便签</button>
      <span style="font-size:12px;color:var(--text-3)">${notes.length} 张便签</span>
    </div>
    ${cards}`;
}

function openNoteModal(editId) {
  const note = editId ? getNoteById(editId) : null;
  const isEdit = !!note;
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <h3>${isEdit ? '编辑便签' : '新建便签'}</h3>
    <form id="note-form">
      <div class="form-group">
        <label class="form-label">内容</label>
        <textarea class="form-textarea" id="nf-text" required placeholder="写下你的想法...">${isEdit ? escHtml(note.text) : ''}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">颜色</label>
        <div class="color-picker" id="nf-colors">
          ${COLORS.map(c => `<div class="color-dot ${(isEdit ? note.color : 'yellow')===c?'active':''}" data-c="${c}" title="${COLOR_NAMES[c]}"></div>`).join('')}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">类型</label>
        <select class="form-select" id="nf-type">
          <option value="todo" ${isEdit && note.type==='todo'?'selected':''}>TODO — ${SKU.schedule_vs_todo.todo}</option>
          <option value="schedule" ${isEdit && note.type==='schedule'?'selected':''}>日程 — ${SKU.schedule_vs_todo.schedule}</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">分类（可选，用于待办清单）</label>
        <select class="form-select" id="nf-category">
          <option value="">不分类</option>
          ${data.categories.map(c => `<option value="${escHtml(c)}" ${isEdit && note.category===c?'selected':''}>${escHtml(c)}</option>`).join('')}
        </select>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button type="submit" class="btn btn-primary">${isEdit ? '保存' : '创建'}</button>
      </div>
      <input type="hidden" id="nf-edit-id" value="${editId||''}">
    </form>
  `);
  // Color picker
  document.getElementById('nf-colors').addEventListener('click', e => {
    const dot = e.target.closest('.color-dot');
    if (!dot) return;
    document.querySelectorAll('#nf-colors .color-dot').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
  });
  // Form submit
  document.getElementById('note-form').addEventListener('submit', e => {
    e.preventDefault();
    const text = document.getElementById('nf-text').value.trim();
    if (!text) return;
    const color = document.querySelector('#nf-colors .color-dot.active').dataset.c;
    const type = document.getElementById('nf-type').value;
    const category = document.getElementById('nf-category').value;
    const eid = document.getElementById('nf-edit-id').value;
    if (eid) {
      updateNote(eid, { text, color, type, category });
    } else {
      createNote(text, color, type, category);
    }
    closeModal();
  });
}

// ===== 2. 时间轴 (skill_002: time-visualization-scheduling) =====
function renderTimeline() {
  const date = data.timelineDate || todayStr();
  const blocks = data.timelineBlocks.filter(b => b.date === date);
  const tNotes = data.timelineNotes.filter(tn => tn.date === date);
  const assignedIds = new Set(tNotes.map(tn => tn.noteId));
  const pool = data.notes.filter(n => n.type === 'todo' && !assignedIds.has(n.id));

  let rows = '';
  for (let h = 6; h <= 23; h++) {
    const hBlocks = blocks.filter(b => b.hour === h);
    const hNotes = tNotes.filter(tn => tn.hour === h).map(tn => {
      const note = getNoteById(tn.noteId);
      return note ? { ...note, tlId: tn.id } : null;
    }).filter(Boolean);

    rows += `
      <div class="timeline-row" data-hour="${h}">
        <div class="timeline-label">${String(h).padStart(2,'0')}:00</div>
        <div class="timeline-content">
          ${hBlocks.map(b => `<div class="timeline-block">${escHtml(b.text)}<span class="remove-btn" data-block-id="${b.id}">×</span></div>`).join('')}
          ${hNotes.map(n => `<div class="note-chip" data-color="${n.color}"><span>${escHtml(n.text)}</span><span class="remove-btn" data-tl-id="${n.tlId}">×</span></div>`).join('')}
        </div>
      </div>`;
  }

  const poolHtml = pool.length > 0
    ? pool.map(n => `<div class="note-chip" data-color="${n.color}" draggable="true" data-note-id="${n.id}">${escHtml(n.text)}</div>`).join('')
    : `<div style="font-size:12px;color:var(--text-3);padding:8px 0">没有待安排的 TODO 便签</div>`;

  return `
    <div class="view-header">
      <h2>时间轴</h2>
      <p>在时间轴上圈出固定日程，识别零碎时间，将 TODO 拖入空闲时段</p>
    </div>
    <div class="timeline-date-nav">
      <button class="btn btn-ghost btn-sm" id="tl-prev">←</button>
      <span class="date-display">${formatDate(date)}</span>
      <button class="btn btn-ghost btn-sm" id="tl-next">→</button>
      <button class="btn btn-ghost btn-sm" id="tl-today">今天</button>
      <div class="toolbar-right">
        <button class="btn btn-ghost btn-sm" id="tl-add-block">+ 添加日程块</button>
      </div>
    </div>
    <div class="timeline-container">
      <div class="timeline-hours">${rows}</div>
      <div class="timeline-pool">
        <h4>待安排便签</h4>
        ${poolHtml}
      </div>
    </div>`;
}

// ===== 3. 待办清单 (skill_003: create-pending-task-list) =====
function renderTodo() {
  const todoNotes = data.notes.filter(n => n.type === 'todo');
  let cols = '';
  const cats = data.categories;

  cats.forEach(cat => {
    const items = todoNotes.filter(n => n.category === cat);
    cols += `
      <div class="todo-column">
        <h4>${escHtml(cat)}（${items.length}）</h4>
        ${items.length === 0 ? `<div style="font-size:12px;color:var(--text-3);padding:8px 0">暂无便签</div>` :
          items.map(n => `<div class="todo-item" data-id="${n.id}">
            <div class="todo-check" data-id="${n.id}">✓</div>
            <span class="todo-text">${escHtml(n.text)}</span>
          </div>`).join('')}
      </div>`;
  });

  // Uncategorized
  const uncategorized = todoNotes.filter(n => !n.category || !cats.includes(n.category));
  if (uncategorized.length > 0) {
    cols += `
      <div class="todo-column">
        <h4>未分类（${uncategorized.length}）</h4>
        ${uncategorized.map(n => `<div class="todo-item" data-id="${n.id}">
          <div class="todo-check" data-id="${n.id}">✓</div>
          <span class="todo-text">${escHtml(n.text)}</span>
        </div>`).join('')}
      </div>`;
  }

  if (todoNotes.length === 0) {
    cols = `<div class="empty-state"><div class="empty-icon">☰</div><p>还没有 TODO 便签。在便签板创建类型为 TODO 的便签，分配分类后会自动出现在这里。</p></div>`;
  }

  return `
    <div class="view-header">
      <h2>待办清单</h2>
      <p>按场景分类的待完成事项——外出时、在家时、用电脑时，随手就能查</p>
    </div>
    <div class="toolbar">
      <button class="btn btn-ghost btn-sm" id="todo-add-cat">+ 添加分类</button>
    </div>
    <div class="todo-columns">${cols}</div>`;
}

// ===== 4. 妖怪拆解 (skill_004: task-subdivision-technique) =====
function renderMonster() {
  const monsters = data.monsters;
  const selectedId = data._selectedMonster || (monsters.length > 0 ? monsters[0].id : null);
  const selected = monsters.find(m => m.id === selectedId);

  const listItems = monsters.length > 0
    ? monsters.map(m => `
        <div class="monster-item ${m.id === selectedId ? 'active' : ''}" data-id="${m.id}">
          <span>${escHtml(m.text)}</span>
          <span class="monster-count">${m.children.length}</span>
        </div>`).join('')
    : `<div style="font-size:12px;color:var(--text-3);padding:8px">还没有大任务</div>`;

  let detail = '';
  if (selected) {
    const steps = selected.children.map((s, i) => `
      <li class="step-item">
        <span class="step-num">${i+1}</span>
        <span>${escHtml(s)}</span>
        <span class="remove-step" data-monster="${selected.id}" data-idx="${i}">×</span>
      </li>`).join('');
    detail = `
      <div class="monster-detail-panel">
        <span class="habit-delete" data-monster-del="${selected.id}" title="删除此任务">×</span>
        <h3>${escHtml(selected.text)}</h3>
        <div class="monster-hint">
          妖怪便签特征：${SKU.monster_traits.join('；')}。<br>
          问自己：「要做这件事，第一步具体要做什么？」然后把它拆到最小。
        </div>
        ${selected.children.length > 0 ? `<ul class="step-list">${steps}</ul>` : `<div style="font-size:13px;color:var(--text-3);padding:12px 0">还没有拆解步骤，在下方添加。</div>`}
        <div class="inline-input">
          <input type="text" id="step-input" placeholder="输入一个具体的小步骤，按回车添加">
          <button class="btn btn-primary btn-sm" id="step-add-btn">添加</button>
        </div>
      </div>`;
  } else {
    detail = `<div class="monster-detail-panel"><div class="empty-state"><div class="empty-icon">👹</div><p>选择左侧的大任务，或新建一个。将模糊的大任务拆解为可立即执行的小步骤。</p></div></div>`;
  }

  return `
    <div class="view-header">
      <h2>妖怪拆解</h2>
      <p>面对让人拖延的模糊大任务，拆解为极小的、能立即动手的步骤</p>
    </div>
    <div class="monster-layout">
      <div class="monster-list-panel">
        <h4>大任务列表</h4>
        ${listItems}
        <div class="inline-input" style="margin-top:16px">
          <input type="text" id="monster-input" placeholder="输入大任务名称">
          <button class="btn btn-primary btn-sm" id="monster-add-btn">添加</button>
        </div>
      </div>
      ${detail}
    </div>`;
}

// ===== 5. 整理方阵 (skill_005+006+007) =====
function renderMatrix() {
  const tab = data._matrixTab || 'priority';
  const matrix = tab === 'priority' ? data.matrixPriority : data.matrixTime;
  const labels = tab === 'priority' ? SKU.priority_matrix : SKU.time_matrix;
  const axisX = tab === 'priority' ? ['影响小 ←','→ 影响大'] : ['人力少 ←','→ 人力多'];
  const axisY = tab === 'priority' ? ['压力大 ↑','↓ 压力小'] : ['时间短 ↑','↓ 时间长'];

  // Notes not in this matrix
  const inMatrix = new Set();
  ['A','B','C','D'].forEach(q => matrix[q].forEach(id => inMatrix.add(id)));
  const pool = data.notes.filter(n => n.type === 'todo' && !inMatrix.has(n.id));

  function cellHtml(q) {
    const ids = matrix[q] || [];
    const notes = ids.map(getNoteById).filter(Boolean);
    return `
      <div class="matrix-cell" data-quadrant="${q}">
        <div class="matrix-cell-header">
          <span class="quad-label">${labels[q].label}</span>
          <span>${labels[q].desc}</span>
        </div>
        ${notes.map(n => `<div class="note-chip" data-color="${n.color}"><span>${escHtml(n.text)}</span><span class="chip-remove" data-quad="${q}" data-note-id="${n.id}">×</span></div>`).join('')}
        ${notes.length === 0 ? `<div style="font-size:12px;color:var(--text-3);padding:8px 0">拖入便签</div>` : ''}
      </div>`;
  }

  return `
    <div class="view-header">
      <h2>整理方阵</h2>
      <p>用四象限矩阵为任务排序——先做什么、后做什么，一目了然</p>
    </div>
    <div class="tab-bar">
      <button class="tab-btn ${tab==='priority'?'active':''}" data-tab="priority">优先方阵</button>
      <button class="tab-btn ${tab==='time'?'active':''}" data-tab="time">时间方阵</button>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:4px">
      <div style="width:50%;text-align:center" class="matrix-axis-label">${axisX[0]}</div>
      <div style="width:50%;text-align:center" class="matrix-axis-label">${axisX[1]}</div>
    </div>
    <div style="display:flex;gap:12px">
      <div style="flex:1">
        <div class="matrix-axis-label" style="margin-bottom:4px">${axisY[0]}</div>
        <div class="matrix-grid">
          ${cellHtml('B')}${cellHtml('A')}${cellHtml('D')}${cellHtml('C')}
        </div>
        <div class="matrix-axis-label" style="margin-top:4px">${axisY[1]}</div>
      </div>
    </div>
    <div class="matrix-pool" style="margin-top:16px">
      <h4>待分配便签（拖入上方象限）</h4>
      <div class="chips-wrap">
        ${pool.length > 0 ? pool.map(n => `<div class="note-chip" data-color="${n.color}" draggable="true" data-note-id="${n.id}">${escHtml(n.text)}</div>`).join('') : `<div style="font-size:12px;color:var(--text-3)">所有 TODO 便签已分配，或暂无便签</div>`}
      </div>
    </div>`;
}

// ===== 6. 21天打卡 (skill_009: habit-formation-21-day-rule) =====
function renderHabit() {
  const habits = data.habits;
  let cards = '';
  if (habits.length === 0) {
    cards = `<div class="empty-state"><div class="empty-icon">◉</div><p>${SKU.habit_21day}<br><br>点击「新建习惯」开始你的21天挑战。</p></div>`;
  } else {
    cards = habits.map(h => {
      const checked = h.days.filter(Boolean).length;
      const pct = Math.round(checked / 21 * 100);
      const startDate = new Date(h.startDate);
      const today = new Date(todayStr() + 'T00:00:00');
      const daysPassed = Math.floor((today - startDate) / 86400000);

      const dots = h.days.map((d, i) => {
        const isFuture = i > daysPassed;
        return `<div class="habit-dot ${d?'checked':''} ${isFuture?'future':''}" data-habit="${h.id}" data-day="${i}">${i+1}</div>`;
      }).join('');

      const done = checked >= 21;
      return `
        <div class="habit-card">
          <span class="habit-delete" data-habit-del="${h.id}">×</span>
          <h4>${escHtml(h.goal)}</h4>
          <div class="habit-reward">达成奖励：${escHtml(h.reward)}</div>
          <div class="habit-dots">${dots}</div>
          <div class="habit-progress">
            <div class="habit-bar"><div class="habit-bar-fill" style="width:${pct}%"></div></div>
            <span>${checked}/21</span>
          </div>
          ${done ? `<div class="habit-celebration">恭喜！你已经坚持了21天，习惯已养成！去享受你的奖励「${escHtml(h.reward)}」吧。</div>` : ''}
        </div>`;
    }).join('');
  }

  return `
    <div class="view-header">
      <h2>21天打卡</h2>
      <p>坚持21天，将整理行为变成无意识的习惯</p>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" id="btn-new-habit">+ 新建习惯</button>
    </div>
    ${cards}`;
}

// ===== EVENT BINDING =====
function bindViewEvents(view) {
  const handlers = {
    board: bindBoardEvents,
    timeline: bindTimelineEvents,
    todo: bindTodoEvents,
    monster: bindMonsterEvents,
    matrix: bindMatrixEvents,
    habit: bindHabitEvents,
    inventory: bindInventoryEvents,
    family: bindFamilyEvents
  };
  if (handlers[view]) handlers[view]();
}

function bindBoardEvents() {
  const btn = document.getElementById('btn-new-note');
  if (btn) btn.addEventListener('click', () => openNoteModal());

  app.addEventListener('click', e => {
    const editBtn = e.target.closest('.note-action-btn.edit');
    if (editBtn) {
      const card = editBtn.closest('.note-card');
      openNoteModal(card.dataset.id);
      return;
    }
    const delBtn = e.target.closest('.note-action-btn.delete');
    if (delBtn) {
      const card = delBtn.closest('.note-card');
      deleteNote(card.dataset.id);
    }
  });
}

function bindTimelineEvents() {
  // Date navigation
  document.getElementById('tl-prev')?.addEventListener('click', () => {
    const d = new Date(data.timelineDate + 'T00:00:00');
    d.setDate(d.getDate() - 1);
    data.timelineDate = d.toISOString().slice(0,10);
    save(); render();
  });
  document.getElementById('tl-next')?.addEventListener('click', () => {
    const d = new Date(data.timelineDate + 'T00:00:00');
    d.setDate(d.getDate() + 1);
    data.timelineDate = d.toISOString().slice(0,10);
    save(); render();
  });
  document.getElementById('tl-today')?.addEventListener('click', () => {
    data.timelineDate = todayStr();
    save(); render();
  });

  // Add schedule block
  document.getElementById('tl-add-block')?.addEventListener('click', () => {
    openModal(`
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>添加日程块</h3>
      <form id="block-form">
        <div class="form-group">
          <label class="form-label">日程内容</label>
          <input class="form-input" id="bf-text" required placeholder="如：接孩子放学">
        </div>
        <div class="form-group">
          <label class="form-label">时间（小时）</label>
          <select class="form-select" id="bf-hour">
            ${Array.from({length:18},(_, i)=>i+6).map(h => `<option value="${h}">${String(h).padStart(2,'0')}:00</option>`).join('')}
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary">添加</button>
        </div>
      </form>
    `);
    document.getElementById('block-form').addEventListener('submit', e => {
      e.preventDefault();
      const text = document.getElementById('bf-text').value.trim();
      const hour = parseInt(document.getElementById('bf-hour').value);
      if (!text) return;
      data.timelineBlocks.push({ id: uid(), text, hour, date: data.timelineDate });
      save(); closeModal(); render();
    });
  });

  // Remove block/note
  app.addEventListener('click', e => {
    const rb = e.target.closest('[data-block-id]');
    if (rb) {
      data.timelineBlocks = data.timelineBlocks.filter(b => b.id !== rb.dataset.blockId);
      save(); render(); return;
    }
    const rn = e.target.closest('[data-tl-id]');
    if (rn) {
      data.timelineNotes = data.timelineNotes.filter(tn => tn.id !== rn.dataset.tlId);
      save(); render(); return;
    }
  });

  // Drag and drop
  setupTimelineDragDrop();
}

function setupTimelineDragDrop() {
  const chips = document.querySelectorAll('.timeline-pool .note-chip[draggable]');
  chips.forEach(chip => {
    chip.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', chip.dataset.noteId);
      e.dataTransfer.effectAllowed = 'move';
      chip.classList.add('dragging');
    });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
  });

  const rows = document.querySelectorAll('.timeline-row');
  rows.forEach(row => {
    row.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      row.classList.add('drag-over');
    });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over');
      const noteId = e.dataTransfer.getData('text/plain');
      if (!noteId) return;
      const hour = parseInt(row.dataset.hour);
      data.timelineNotes.push({ id: uid(), noteId, hour, date: data.timelineDate });
      save(); render();
    });
  });
}

function bindTodoEvents() {
  // Add category
  document.getElementById('todo-add-cat')?.addEventListener('click', () => {
    openModal(`
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>添加分类</h3>
      <form id="cat-form">
        <div class="form-group">
          <label class="form-label">分类名称</label>
          <input class="form-input" id="cf-name" required placeholder="如：宝宝睡着时可做的事">
          <div class="form-hint">参考分类：外出时顺便做、在家有空时做、午休时可做、休息日可做</div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary">添加</button>
        </div>
      </form>
    `);
    document.getElementById('cat-form').addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('cf-name').value.trim();
      if (!name || data.categories.includes(name)) return;
      data.categories.push(name);
      save(); closeModal(); render();
    });
  });

  // Complete (delete) todo note
  app.addEventListener('click', e => {
    const check = e.target.closest('.todo-check[data-id]');
    if (check) {
      deleteNote(check.dataset.id);
    }

function bindMonsterEvents() {
  // Select monster
  app.addEventListener('click', e => {
    const item = e.target.closest('.monster-item');
    if (item) {
      data._selectedMonster = item.dataset.id;
      render();
      return;
    }
    // Remove step
    const rs = e.target.closest('.remove-step');
    if (rs) {
      const m = data.monsters.find(m => m.id === rs.dataset.monster);
      if (m) {
        m.children.splice(parseInt(rs.dataset.idx), 1);
        save(); render();
      }
      return;
    }
    // Delete monster
    const md = e.target.closest('[data-monster-del]');
    if (md) {
      data.monsters = data.monsters.filter(m => m.id !== md.dataset.monsterDel);
      data._selectedMonster = data.monsters.length > 0 ? data.monsters[0].id : null;
      save(); render();
      return;
    }
  });

  // Add monster
  const addMonster = () => {
    const input = document.getElementById('monster-input');
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;
    const m = { id: uid(), text, children: [] };
    data.monsters.push(m);
    data._selectedMonster = m.id;
    save(); render();
  };
  document.getElementById('monster-add-btn')?.addEventListener('click', addMonster);
  document.getElementById('monster-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addMonster(); } });

  // Add step
  const addStep = () => {
    const input = document.getElementById('step-input');
    if (!input) return;
    const text = input.value.trim();
    if (!text || !data._selectedMonster) return;
    const m = data.monsters.find(m => m.id === data._selectedMonster);
    if (m) {
      m.children.push(text);
      save(); render();
    }
  };
  document.getElementById('step-add-btn')?.addEventListener('click', addStep);
  document.getElementById('step-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addStep(); } });
}

function bindMatrixEvents() {
  // Tab switch
  app.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      data._matrixTab = btn.dataset.tab;
      render();
    });
  });

  // Remove from quadrant
  app.addEventListener('click', e => {
    const rm = e.target.closest('.chip-remove');
    if (rm) {
      const q = rm.dataset.quad;
      const nid = rm.dataset.noteId;
      const tab = data._matrixTab || 'priority';
      const matrix = tab === 'priority' ? data.matrixPriority : data.matrixTime;
      matrix[q] = matrix[q].filter(id => id !== nid);
      save(); render();
    }
  });

  // Drag and drop to quadrants
  const chips = app.querySelectorAll('.matrix-pool .note-chip[draggable]');
  chips.forEach(chip => {
    chip.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', chip.dataset.noteId);
      e.dataTransfer.effectAllowed = 'move';
      chip.classList.add('dragging');
    });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
  });

  const cells = app.querySelectorAll('.matrix-cell');
  cells.forEach(cell => {
    cell.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      cell.classList.add('drag-over');
    });
    cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('drag-over');
      const noteId = e.dataTransfer.getData('text/plain');
      if (!noteId) return;
      const q = cell.dataset.quadrant;
      const tab = data._matrixTab || 'priority';
      const matrix = tab === 'priority' ? data.matrixPriority : data.matrixTime;
      if (!matrix[q].includes(noteId)) {
        // Remove from other quadrants first
        ['A','B','C','D'].forEach(oq => {
          matrix[oq] = matrix[oq].filter(id => id !== noteId);
        });
        matrix[q].push(noteId);
        save(); render();
      }
    });
  });
}

function bindHabitEvents() {
  document.getElementById('btn-new-habit')?.addEventListener('click', () => {
    openModal(`
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>新建21天习惯</h3>
      <form id="habit-form">
        <div class="form-group">
          <label class="form-label">习惯目标</label>
          <input class="form-input" id="hf-goal" required placeholder="如：餐桌不堆东西">
        </div>
        <div class="form-group">
          <label class="form-label">达成奖励</label>
          <input class="form-input" id="hf-reward" required placeholder="如：吃一顿烤肉">
          <div class="form-hint">${SKU.habit_21day}</div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary">开始挑战</button>
        </div>
      </form>
    `);
    document.getElementById('habit-form').addEventListener('submit', e => {
      e.preventDefault();
      const goal = document.getElementById('hf-goal').value.trim();
      const reward = document.getElementById('hf-reward').value.trim();
      if (!goal || !reward) return;
      data.habits.push({
        id: uid(), goal, reward,
        startDate: todayStr(),
        days: Array(21).fill(false)
      });
      save(); closeModal(); render();
    });
  });

  // Toggle habit dot
  app.addEventListener('click', e => {
    const dot = e.target.closest('.habit-dot:not(.future)');
    if (dot) {
      const h = data.habits.find(h => h.id === dot.dataset.habit);
      if (h) {
        const i = parseInt(dot.dataset.day);
        h.days[i] = !h.days[i];
        save(); render();
      }
      return;
    }
    // Delete habit
    const del = e.target.closest('[data-habit-del]');
    if (del) {
      data.habits = data.habits.filter(h => h.id !== del.dataset.habitDel);
      save(); render();
    }
  });
}

function bindInventoryEvents() {
  document.getElementById('btn-add-inv')?.addEventListener('click', () => {
    openModal(`
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>添加库存物品</h3>
      <form id="inv-form">
        <div class="form-group">
          <label class="form-label">物品名称</label>
          <input class="form-input" id="if-name" required placeholder="如：洗手液">
          <div class="form-hint">在备用物品上贴循环便签，启用备用时撕下便签贴入购物清单</div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary">添加</button>
        </div>
      </form>
    `);
    document.getElementById('inv-form').addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('if-name').value.trim();
      if (!name) return;
      data.inventory.push({ id: uid(), name, hasBackup: true, inShoppingList: false });
      save(); closeModal(); render();
    });
  });

  app.addEventListener('click', e => {
    // Use backup → needs to buy
    const ub = e.target.closest('[data-use-backup]');
    if (ub) {
      const item = data.inventory.find(i => i.id === ub.dataset.useBackup);
      if (item) {
        item.hasBackup = false;
        item.inShoppingList = true;
        save(); render();
      }
      return;
    }
    // Bought → cycle back
    const bt = e.target.closest('[data-bought]');
    if (bt) {
      const item = data.inventory.find(i => i.id === bt.dataset.bought);
      if (item) {
        item.hasBackup = true;
        item.inShoppingList = false;
        save(); render();
      }
      return;
    }
    // Delete
    const del = e.target.closest('[data-inv-del]');
    if (del) {
      data.inventory = data.inventory.filter(i => i.id !== del.dataset.invDel);
      save(); render();
    }
  });
}

function bindFamilyEvents() {
  // Toggle task
  app.addEventListener('click', e => {
    const check = e.target.closest('[data-ftask]');
    if (check) {
      const t = data.familyTasks.find(t => t.id === check.dataset.ftask);
      if (t) { t.done = !t.done; save(); render(); }
      return;
    }
    // Delete task
    const del = e.target.closest('[data-ftask-del]');
    if (del) {
      data.familyTasks = data.familyTasks.filter(t => t.id !== del.dataset.ftaskDel);
      save(); render();
    }
  });

  // Add task per member
  document.querySelectorAll('.family-input').forEach(input => {
    const addTask = () => {
      const text = input.value.trim();
      if (!text) return;
      data.familyTasks.push({ id: uid(), text, assignee: input.dataset.member, done: false });
      save(); render();
    };
    input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addTask(); } });
  });
}

// ===== INIT =====
switchView(data.currentView || 'board');
</script>
</body>
</html>
