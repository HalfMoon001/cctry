<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cctry — 工具 App 合集</title>
<style>
:root {
  --bg: #FAFAF7;
  --surface: #FFFFFF;
  --text-1: #1A1A1A;
  --text-2: #6B6B6B;
  --accent: #C67A4B;
  --border: #E8E6E1;
  --font-display: "Hiragino Mincho ProN", "Songti SC", "Noto Serif SC", serif;
  --font-body: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  max-width: 560px;
  width: 100%;
  padding: 64px 32px;
  text-align: center;
}
h1 {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 8px;
}
.subtitle {
  font-size: 14px;
  color: var(--text-2);
  margin-bottom: 48px;
}
.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 28px 24px;
  text-decoration: none;
  color: inherit;
  display: block;
  transition: all 220ms cubic-bezier(0.25, 0.1, 0.25, 1);
  text-align: left;
  margin-bottom: 16px;
}
.project-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.07);
  border-color: var(--accent);
}
.project-card h2 {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 6px;
}
.project-card p {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.5;
}
.project-card .tag {
  display: inline-block;
  margin-top: 12px;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(198,122,75,0.08);
  color: var(--accent);
}
.footer {
  margin-top: 48px;
  font-size: 12px;
  color: var(--text-2);
}
</style>
</head>
<body>
<div class="container">
  <h1>cctry</h1>
  <p class="subtitle">从书籍提取知识，生成工具 App</p>

  <a class="project-card" href="./bianqian-app/">
    <h2>便签整理术</h2>
    <p>基于《人人都能做到的便签整理术》，8 个功能模块覆盖时间管理、任务拆解、习惯养成、库存管理</p>
    <span class="tag">须藤由美 · 10 skills</span>
  </a>

  <!-- 未来项目在此添加 -->

  <div class="footer">HalfMoon001 × Claude Opus 4.6</div>
</div>
</body>
</html>
